[package]
name = "raft"
version = "0.2.1"
edition = "2024"
description = "Small filesystem-backed agent-to-agent turn monitor."

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
signal-hook = "0.3"

[[bin]]
name = "raft"
path = "src/main.rs"
